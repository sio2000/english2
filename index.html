    <script>
      (function() {
        function removeBolt() {
          document.querySelectorAll('a[href*="bolt.new"], img[src*="bolt"], [class*="bolt"], [id*="bolt"], a[href*="bolt"], div[data-bolt], iframe[src*="bolt"]').forEach(function(el) { el.remove(); });
          document.querySelectorAll('script[src*="bolt"]').forEach(function(el) { el.remove(); });
        }
        removeBolt();
        if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', removeBolt); }
        window.addEventListener('load', removeBolt);
        new MutationObserver(function(mutations) {
          mutations.forEach(function() { removeBolt(); });
        }).observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
